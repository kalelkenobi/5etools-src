name: Sync upstream

on:
 workflow_dispatch:
 schedule:
   - cron: "0 5 * * *"

permissions:
 contents: write

concurrency:
 group: sync-upstream
 cancel-in-progress: false

jobs:
 sync:
   runs-on: ubuntu-latest

   steps:
     - name: Check out fork
       uses: actions/checkout@v5
       with:
         fetch-depth: 0
         token: ${{ secrets.GITHUB_TOKEN }}

     - name: Configure git
       run: |
         git config user.name "github-actions[bot]"
         git config user.email "github-actions[bot]@users.noreply.github.com"

     - name: Sync from upstream
       run: |
         git remote add upstream https://github.com/5etools-mirror-3/5etools-src.git || true
         git fetch upstream

         CURRENT_BRANCH="${GITHUB_REF_NAME:-main}"

         git checkout "$CURRENT_BRANCH"

         if git show-ref --verify --quiet "refs/remotes/upstream/$CURRENT_BRANCH"; then
           UPSTREAM_BRANCH="$CURRENT_BRANCH"
         elif git show-ref --verify --quiet "refs/remotes/upstream/main"; then
           UPSTREAM_BRANCH="main"
         elif git show-ref --verify --quiet "refs/remotes/upstream/master"; then
           UPSTREAM_BRANCH="master"
         else
           echo "Could not find matching upstream branch, main, or master."
           git branch -r
           exit 1
         fi

         echo "Syncing origin/$CURRENT_BRANCH with upstream/$UPSTREAM_BRANCH"

         git merge "upstream/$UPSTREAM_BRANCH" --no-edit

         if git diff --quiet origin/"$CURRENT_BRANCH".."$CURRENT_BRANCH"; then
           echo "Fork is already up to date."
         else
           git push origin "$CURRENT_BRANCH"
         fi
