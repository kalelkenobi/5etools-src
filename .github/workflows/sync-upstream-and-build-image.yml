name: Sync upstream and build image

on:
 workflow_dispatch:
 schedule:
   - cron: "0 6 * * *"

permissions:
 contents: write
 packages: write

concurrency:
 group: sync-upstream-build-image
 cancel-in-progress: false

env:
 UPSTREAM_REPO: https://github.com/5etools-mirror-3/5etools-src.git
 IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/5etools-src
 BASE_IMAGE: ghcr.io/${{ github.repository_owner }}/5etools-img:latest

jobs:
 sync:
   runs-on: ubuntu-latest
   outputs:
     branch: ${{ steps.sync.outputs.branch }}
     changed: ${{ steps.sync.outputs.changed }}
     version: ${{ steps.version.outputs.version }}

   steps:
     - name: Check out fork
       uses: actions/checkout@v5
       with:
         fetch-depth: 0
         token: ${{ secrets.GITHUB_TOKEN }}

     - name: Configure git
       run: |
         git config user.name "github-actions[bot]"
         git config user.email "github-actions[bot]@users.noreply.github.com"

     - name: Sync from upstream
       id: sync
       run: |
         git remote add upstream "${UPSTREAM_REPO}" || true
         git fetch upstream

         CURRENT_BRANCH="${GITHUB_REF_NAME:-main}"
         git checkout "$CURRENT_BRANCH"

         if git show-ref --verify --quiet "refs/remotes/upstream/$CURRENT_BRANCH"; then
           UPSTREAM_BRANCH="$CURRENT_BRANCH"
         elif git show-ref --verify --quiet "refs/remotes/upstream/main"; then
           UPSTREAM_BRANCH="main"
         elif git show-ref --verify --quiet "refs/remotes/upstream/master"; then
           UPSTREAM_BRANCH="master"
         else
           echo "Could not find matching upstream branch, main, or master."
           git branch -r
           exit 1
         fi

         BEFORE_SHA=$(git rev-parse HEAD)
         echo "Syncing origin/$CURRENT_BRANCH with upstream/$UPSTREAM_BRANCH"
         git merge "upstream/$UPSTREAM_BRANCH" --no-edit
         AFTER_SHA=$(git rev-parse HEAD)

         echo "branch=$CURRENT_BRANCH" >> "$GITHUB_OUTPUT"

         if [ "$BEFORE_SHA" = "$AFTER_SHA" ]; then
           echo "changed=false" >> "$GITHUB_OUTPUT"
           echo "Fork is already up to date."
         else
           echo "changed=true" >> "$GITHUB_OUTPUT"
           git push origin "$CURRENT_BRANCH"
         fi

     - name: Detect version
       id: version
       run: |
         TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
         if [ -n "$TAG" ]; then
           VERSION="${TAG#v}"
         else
           VERSION="$(date -u +%Y%m%d)-${GITHUB_SHA::7}"
         fi
         echo "version=$VERSION" >> "$GITHUB_OUTPUT"

 build:
   runs-on: ubuntu-latest
   needs: sync

   steps:
     - name: Free disk space
       run: |
         sudo rm -rf /usr/share/dotnet
         sudo rm -rf /opt/ghc
         sudo rm -rf /usr/local/lib/android
         sudo rm -rf /usr/share/swift
         sudo rm -rf /usr/local/share/chromium
         docker system prune -af

     - name: Check out synced fork
       uses: actions/checkout@v5
       with:
         ref: ${{ needs.sync.outputs.branch }}

     - name: Set up Node
       uses: actions/setup-node@v5
       with:
         node-version: lts/*
         cache: npm

     - name: Set deployed flag
       run: |
         bash ./.github/set-deployed-flag.sh "${{ needs.sync.outputs.version }}"

     - name: Build service worker
       run: |
         npm ci || npm install
         npm run build:sw:prod
         sed -i 's/sw.js//g' .gitignore
         sed -i 's/sw-injector.js//g' .gitignore

     - name: Build SEO pages
       env:
         VET_SEO_IS_DEV_MODE: true
         VET_BASE_SITE_URL: "https://${{ github.repository_owner }}.github.io/"
         VET_SEO_IS_SKIP_UA_ETC: true
       run: |
         npm run build:seo -- "${{ needs.sync.outputs.version }}"

     - name: Use forked image base
       run: |
         sed -i "s#^FROM .*5etools-img:.*#FROM ${BASE_IMAGE}#" Dockerfile
         head -n 5 Dockerfile

     - name: Set up QEMU
       uses: docker/setup-qemu-action@v3

     - name: Set up Docker Buildx
       uses: docker/setup-buildx-action@v3

     - name: Log in to GitHub Container Registry
       uses: docker/login-action@v3
       with:
         registry: ghcr.io
         username: ${{ github.actor }}
         password: ${{ secrets.GITHUB_TOKEN }}

     - name: Generate Docker metadata
       id: meta
       uses: docker/metadata-action@v5
       with:
         images: ${{ env.IMAGE_NAME }}
         tags: |
           type=raw,value=latest
           type=raw,value=${{ needs.sync.outputs.version }}
           type=sha,prefix=sha-

     - name: Build and push multi-arch image
       uses: docker/build-push-action@v6
       with:
         context: .
         platforms: linux/amd64,linux/arm64
         push: true
         tags: ${{ steps.meta.outputs.tags }}
         labels: ${{ steps.meta.outputs.labels }}
